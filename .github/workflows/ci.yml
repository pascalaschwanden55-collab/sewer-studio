name: CI – Build & Test

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore AuswertungPro.sln

      - name: Build (Release)
        run: dotnet build AuswertungPro.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test AuswertungPro.sln -c Release --no-build --verbosity normal --logger "trx;LogFileName=results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/results.trx"

      # Roadmap Z.4: Coverage-Report. Aktuell als Artifact + Job-Summary,
      # NICHT als PR-Gate (Slice-1-Baseline muss erst etablieren).
      - name: Install ReportGenerator
        if: always()
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        if: always()
        shell: pwsh
        run: |
          $cov = Get-ChildItem -Recurse -Filter "coverage.cobertura.xml" | Select-Object -First 5
          if (-not $cov) { Write-Host "Keine coverage.cobertura.xml gefunden, ueberspringe Report"; exit 0 }
          reportgenerator "-reports:**/coverage.cobertura.xml" "-targetdir:CoverageReport" "-reporttypes:Html;MarkdownSummaryGithub;TextSummary"
          if (Test-Path "CoverageReport/Summary.txt") {
            Get-Content "CoverageReport/Summary.txt" | Select-Object -First 30
          }
          if (Test-Path "CoverageReport/SummaryGithub.md") {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value (Get-Content "CoverageReport/SummaryGithub.md" -Raw)
          }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport/

  python-sidecar-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: sidecar

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install ruff

      - name: Ruff check (lint)
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      # Phase 5.1: Sidecar-Test-Coverage. Wir fahren ohne Hard-Gate
      # (--cov-fail-under) bis eine Baseline etabliert ist. Coverage-Bericht
      # erscheint im Job-Summary, XML-Artifact ist verfuegbar fuer Codecov o.ae.
      #
      # Wir installieren bewusst nur die Test-Minimal-Deps (kein ultralytics/realesrgan):
      # - torch CPU-only (klein, fuer dinov2_wrapper / main.py Imports)
      # - fastapi + httpx + Pillow + numpy + pydantic-settings (Schema/Routes)
      # - pytest + pytest-cov
      # Die Tests test_batch_endpoints.py und test_pipeline.py brauchen einen
      # laufenden Sidecar bzw. echte Modelle und werden im CI bewusst ausgespart.
      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.1" "torchvision>=0.16"
          pip install \
            "fastapi>=0.110" "uvicorn[standard]>=0.29" \
            "pydantic>=2.0" "pydantic-settings>=2.0" \
            "Pillow>=10.0" "numpy>=1.24" \
            "pytest>=8.0" "pytest-cov>=5.0" "httpx>=0.27"

      - name: Run pytest with coverage (Baseline, kein Hard-Gate)
        env:
          # Sidecar laeuft im Dev-Modus (Auth aus). Im Prod-Container immer Token setzen.
          SEWER_SIDECAR_AUTH: disabled
        run: |
          # CI-relevante Tests: alles, was OHNE GPU + ohne echte Modell-Gewichte laeuft.
          # test_batch_endpoints.py / test_pipeline.py brauchen einen laufenden Sidecar.
          # test_yolo.py (ausser test_health), test_dino.py, test_sam.py wuerden echte
          # Weights laden — die werden bewusst in CI uebersprungen (lokal weiter ausgefuehrt).
          pytest --cov=sidecar --cov-report=term-missing --cov-report=xml -v \
            tests/test_enhance.py \
            tests/test_dinov2.py \
            tests/test_yolo_runtime.py \
            tests/test_yolo.py::test_health

      - name: Append coverage summary to job summary
        if: always()
        run: |
          {
            echo "## Sidecar Coverage (Phase 5.1 Baseline)"
            echo ""
            echo "Hard-Gate ist absichtlich aus — erst Baseline messen, dann Gate setzen."
            echo ""
            if [ -f coverage.xml ]; then
              pct=$(python -c "import xml.etree.ElementTree as ET; r=ET.parse('coverage.xml').getroot(); print(f'{float(r.get(\"line-rate\"))*100:.1f}')")
              echo "**Line Coverage:** ${pct}%"
            else
              echo "_coverage.xml nicht gefunden_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-coverage
          path: sidecar/coverage.xml
          if-no-files-found: ignore
